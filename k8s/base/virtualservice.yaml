apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: score-api
  labels:
    app.kubernetes.io/name: score-api
spec:
  hosts:
    - score-api.dev.platform.ohanyere.internal
  gateways:
    - istio-system/platform-gateway
  http:
    - route:
        - destination:
            host: score-api
            port:
              number: 80
          weight: 100
