apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: score-api-alerts
  labels:
    app.kubernetes.io/name: score-api
    release: prometheus
spec:
  groups:
    - name: score-api.availability
      rules:
        - alert: score-apiHighErrorRate
          expr: sum(rate(http_requests_total{service="score-api",status=~"5.."}[5m])) / sum(rate(http_requests_total{service="score-api"}[5m])) > 0.05
          for: 10m
          labels:
            severity: warning
            team: Commerce
          annotations:
            summary: score-api has elevated 5xx responses.
            runbook_url: docs/RUNBOOK.md
        - alert: score-apiUnavailable
          expr: up{job="score-api"} == 0
          for: 5m
          labels:
            severity: critical
            team: Commerce
          annotations:
            summary: score-api is not being scraped or is unavailable.
            runbook_url: docs/RUNBOOK.md
